<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Glitch — CSS Games</title>
  <link rel="stylesheet" href="../../assets/style.css">
  <style>
    body { display:flex; flex-direction:column; align-items:center; padding:4rem 1rem 3rem; }

    header { text-align:center; margin-bottom:2rem; }
    header a { font-family:'JetBrains Mono',monospace; font-size:.75rem; color:var(--muted); text-decoration:none; display:inline-block; margin-bottom:1rem; transition:color .2s; }
    header a:hover { color:var(--text); }
    header h1 { font-size:clamp(2rem,5vw,3rem); font-weight:900; margin-top:.4rem; }
    header p  { color:var(--muted); font-size:.8rem; margin-top:.4rem; font-family:'JetBrains Mono',monospace; }

    .stats { display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; justify-content:center; }

    #status {
      font-family:'JetBrains Mono',monospace;
      font-size:.82rem;
      color:var(--muted);
      margin-bottom:1.25rem;
      min-height:1.3rem;
      text-align:center;
      letter-spacing:.05em;
    }

    /* ── 2×2 board ── */
    #board {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:.75rem;
      width:100%;
      max-width:380px;
    }

    .panel {
      aspect-ratio:1;
      border-radius:18px;
      border:2px solid;
      cursor:pointer;
      transition:filter .1s, transform .1s, box-shadow .15s, background .1s;
      filter:brightness(.3);
    }

    .panel.blocked { pointer-events:none; }

    /* active = simon flash */
    .panel.active  { filter:brightness(1);   transform:scale(.96); }
    /* pressed = player tap */
    .panel.pressed { filter:brightness(1.2); transform:scale(.93); }

    /* violet */
    .panel[data-color="violet"] { background:rgba(124,58,237,.25); border-color:rgba(124,58,237,.45); }
    .panel[data-color="violet"].active,
    .panel[data-color="violet"].pressed { background:rgba(124,58,237,.55); box-shadow:0 0 40px rgba(124,58,237,.75); }

    /* cyan */
    .panel[data-color="cyan"] { background:rgba(6,182,212,.25); border-color:rgba(6,182,212,.45); }
    .panel[data-color="cyan"].active,
    .panel[data-color="cyan"].pressed { background:rgba(6,182,212,.55); box-shadow:0 0 40px rgba(6,182,212,.75); }

    /* amber */
    .panel[data-color="amber"] { background:rgba(245,158,11,.25); border-color:rgba(245,158,11,.45); }
    .panel[data-color="amber"].active,
    .panel[data-color="amber"].pressed { background:rgba(245,158,11,.55); box-shadow:0 0 40px rgba(245,158,11,.75); }

    /* emerald */
    .panel[data-color="emerald"] { background:rgba(16,185,129,.25); border-color:rgba(16,185,129,.45); }
    .panel[data-color="emerald"].active,
    .panel[data-color="emerald"].pressed { background:rgba(16,185,129,.55); box-shadow:0 0 40px rgba(16,185,129,.75); }

    .actions { display:flex; gap:.75rem; margin-top:1.5rem; }

    /* ── wrong flash ── */
    @keyframes wrong-flash {
      0%,100% { background:transparent; }
      30%,70%  { background:rgba(239,68,68,.18); }
    }
    #board.wrong { animation:wrong-flash .45s ease; border-radius:18px; }

    /* ── Game-over overlay ── */
    #over-overlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:50; }
    #over-overlay.show { display:flex; }
    #over-bg { position:absolute; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(8px); }
    #over-box {
      position:relative; border-radius:22px; max-width:480px; width:calc(100% - 2rem); margin:1rem;
      border-color:rgba(124,58,237,.4) !important; overflow:hidden;
    }

    .over-section { padding:1.8rem 2rem; }
    .over-section + .over-section { border-top:1px solid rgba(255,255,255,.07); }

    #over-score-display { font-size:3.5rem; font-weight:900; color:#7C3AED; line-height:1; }
    #over-stats { font-size:.8rem; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-top:.4rem; }

    /* name form */
    #name-form { display:flex; gap:.6rem; margin-top:1rem; }
    #name-input {
      flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
      border-radius:10px; padding:.55rem .9rem; color:#fff; font-size:.9rem;
      font-family:'JetBrains Mono',monospace; outline:none; transition:border-color .2s;
    }
    #name-input:focus { border-color:rgba(124,58,237,.6); }
    #name-input::placeholder { color:rgba(255,255,255,.25); }

    /* leaderboard */
    #leaderboard-title { font-weight:800; font-size:.95rem; margin-bottom:.9rem; display:flex; align-items:center; gap:.5rem; }
    .lb-row { display:flex; align-items:center; gap:.75rem; padding:.45rem 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:.82rem; }
    .lb-row:last-child { border:none; }
    .lb-rank { font-family:'JetBrains Mono',monospace; font-size:.7rem; color:var(--muted); width:1.4rem; text-align:center; flex-shrink:0; }
    .lb-rank.top { color:#F59E0B; font-weight:900; }
    .lb-name  { flex:1; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lb-score { font-family:'JetBrains Mono',monospace; font-weight:700; color:#7C3AED; flex-shrink:0; }
    .lb-meta  { font-family:'JetBrains Mono',monospace; font-size:.65rem; color:var(--muted); flex-shrink:0; }
    .lb-empty { color:var(--muted); font-size:.8rem; font-family:'JetBrains Mono',monospace; }
    .new-entry { background:rgba(124,58,237,.1); border-radius:8px; padding:.45rem .6rem; margin:-.45rem -.6rem; }
  </style>
</head>
<body>

  <header>
    <a href="../../">← all games</a>
    <div><span class="badge">// signal_glitch.exe</span></div>
    <h1>Signal <span class="gradient-text">Glitch</span></h1>
    <p>Repeat the sequence before the signal corrupts</p>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">ROUND</div>
      <div id="round" class="stat-value" style="color:#06B6D4;">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">SCORE</div>
      <div id="score" class="stat-value" style="color:#7C3AED;">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">BEST</div>
      <div id="best" class="stat-value" style="color:#F59E0B;">—</div>
    </div>
  </div>

  <div id="status">Press START to begin</div>

  <div id="board">
    <div class="panel blocked" data-color="violet"  data-index="0"></div>
    <div class="panel blocked" data-color="cyan"    data-index="1"></div>
    <div class="panel blocked" data-color="amber"   data-index="2"></div>
    <div class="panel blocked" data-color="emerald" data-index="3"></div>
  </div>

  <div class="actions">
    <button id="start-btn"   class="btn btn-primary">▶ Start</button>
    <button id="restart-btn" class="btn btn-secondary" style="display:none;">⟳ Restart</button>
  </div>

  <!-- Game-over overlay -->
  <div id="over-overlay">
    <div id="over-bg"></div>
    <div id="over-box" class="glass">

      <div class="over-section" style="text-align:center;">
        <div style="font-size:2.2rem;">📡</div>
        <div style="font-weight:900;font-size:1.3rem;margin:.3rem 0 .1rem;">Signal <span class="gradient-text">Lost</span></div>
        <div id="over-score-display">0</div>
        <div id="over-stats"></div>
      </div>

      <div class="over-section" id="submit-section">
        <div style="font-size:.8rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:.1rem;">SAVE YOUR SCORE</div>
        <div id="name-form">
          <input id="name-input" type="text" maxlength="20" placeholder="Enter your name…" autocomplete="off">
          <button id="submit-score" class="btn btn-primary" style="flex-shrink:0;">Save</button>
        </div>
        <div id="submit-msg" style="font-size:.75rem;font-family:'JetBrains Mono',monospace;margin-top:.5rem;min-height:1.1rem;"></div>
      </div>

      <div class="over-section">
        <div id="leaderboard-title">🏆 Top 10 — Signal Glitch</div>
        <div id="lb-list"><div style="color:var(--muted);font-size:.8rem;font-family:'JetBrains Mono',monospace;">loading…</div></div>
      </div>

      <div class="over-section" style="padding-top:1rem;padding-bottom:1.2rem;">
        <button id="over-restart" class="btn btn-secondary" style="width:100%;justify-content:center;">⟳ Play Again</button>
      </div>

    </div>
  </div>

  <script>
    const GAME        = 'signal-glitch';
    const API         = '/api/scores';
    const FLASH_DUR   = 500;   // ms panel stays lit
    const FLASH_GAP   = 100;   // ms gap between flashes
    const SPEED_START = 600;   // initial flash duration ms
    const SPEED_MIN   = 200;   // floor
    const SPEED_STEP  = 20;    // reduction per round

    let sequence     = [];
    let playerIndex  = 0;
    let round        = 0;
    let totalScore   = 0;
    let finalScore   = 0;
    let finalRound   = 0;
    let roundStart   = 0;
    let phase        = 'idle'; // idle | playing | input | over
    let submittedName = null;
    let bestScore    = 0;

    const panels      = Array.from(document.querySelectorAll('.panel'));
    const roundEl     = document.getElementById('round');
    const scoreEl     = document.getElementById('score');
    const bestEl      = document.getElementById('best');
    const statusEl    = document.getElementById('status');
    const startBtn    = document.getElementById('start-btn');
    const restartBtn  = document.getElementById('restart-btn');
    const overOverlay = document.getElementById('over-overlay');
    const overScoreEl = document.getElementById('over-score-display');
    const overStats   = document.getElementById('over-stats');
    const submitSec   = document.getElementById('submit-section');
    const nameInput   = document.getElementById('name-input');
    const submitBtn   = document.getElementById('submit-score');
    const submitMsg   = document.getElementById('submit-msg');
    const lbList      = document.getElementById('lb-list');
    const board       = document.getElementById('board');

    // ── helpers ──────────────────────────────────────────────────

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    function flashPanel(panel, duration) {
      return new Promise(resolve => {
        panel.classList.add('active');
        setTimeout(() => { panel.classList.remove('active'); resolve(); }, duration);
      });
    }

    function getFlashDuration() {
      return Math.max(SPEED_MIN, SPEED_START - (round - 1) * SPEED_STEP);
    }

    // ── sequence playback ─────────────────────────────────────────

    async function playSequence() {
      phase = 'playing';
      panels.forEach(p => p.classList.add('blocked'));
      statusEl.textContent = 'WATCH THE SIGNAL…';

      await wait(400);
      const dur = getFlashDuration();
      for (let i = 0; i < sequence.length; i++) {
        if (i > 0) await wait(FLASH_GAP);
        await flashPanel(panels[sequence[i]], dur);
      }

      await wait(300);
      phase       = 'input';
      playerIndex = 0;
      roundStart  = Date.now();
      panels.forEach(p => p.classList.remove('blocked'));
      statusEl.textContent = `YOUR TURN — ${sequence.length} press${sequence.length !== 1 ? 'es' : ''}`;
    }

    // ── game flow ─────────────────────────────────────────────────

    function startGame() {
      sequence      = [];
      playerIndex   = 0;
      round         = 0;
      totalScore    = 0;
      finalScore    = 0;
      submittedName = null;
      phase         = 'idle';

      scoreEl.textContent = '0';
      roundEl.textContent = '—';
      overOverlay.classList.remove('show');
      submitSec.style.display   = 'block';
      submitMsg.textContent     = '';
      nameInput.value           = '';
      startBtn.style.display    = 'none';
      restartBtn.style.display  = 'inline-flex';

      nextRound();
    }

    function nextRound() {
      round++;
      roundEl.textContent = round;
      sequence.push(Math.floor(Math.random() * 4));
      playSequence();
    }

    function onPanelPress(panel) {
      if (phase !== 'input') return;
      const idx = parseInt(panel.dataset.index);

      panel.classList.add('pressed');
      setTimeout(() => panel.classList.remove('pressed'), 150);

      if (idx === sequence[playerIndex]) {
        playerIndex++;

        if (playerIndex === sequence.length) {
          // round clear
          const elapsed    = (Date.now() - roundStart) / 1000;
          const roundScore = Math.max(50, round * 100 - Math.floor(elapsed * 2));
          totalScore      += roundScore;
          scoreEl.textContent = totalScore;
          statusEl.textContent = `ROUND ${round} CLEAR  +${roundScore}`;
          phase = 'idle';
          panels.forEach(p => p.classList.add('blocked'));
          setTimeout(nextRound, 900);
        }
      } else {
        onGameOver();
      }
    }

    function onGameOver() {
      phase      = 'over';
      finalScore = totalScore;
      finalRound = round;
      panels.forEach(p => p.classList.add('blocked'));

      board.classList.add('wrong');
      setTimeout(() => board.classList.remove('wrong'), 450);

      statusEl.textContent = 'WRONG — SIGNAL CORRUPTED';

      if (finalScore > bestScore) {
        bestScore       = finalScore;
        bestEl.textContent = bestScore;
      }

      setTimeout(() => {
        overScoreEl.textContent = finalScore.toLocaleString();
        overStats.textContent   = `round ${finalRound}  ·  score ${finalScore.toLocaleString()}`;
        overOverlay.classList.add('show');
        loadLeaderboard();
      }, 700);
    }

    panels.forEach(p => p.addEventListener('click', () => onPanelPress(p)));
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    document.getElementById('over-restart').addEventListener('click', startGame);

    // ── leaderboard ───────────────────────────────────────────────

    async function loadLeaderboard(highlightName) {
      lbList.innerHTML = '<div style="color:var(--muted);font-size:.8rem;font-family:\'JetBrains Mono\',monospace;">loading…</div>';
      try {
        const res  = await fetch(`${API}?game=${GAME}`);
        const data = await res.json();
        renderLeaderboard(data, highlightName);
      } catch {
        lbList.innerHTML = '<div class="lb-empty">Could not load scores.</div>';
      }
    }

    function renderLeaderboard(scores, highlightName) {
      if (!scores.length) {
        lbList.innerHTML = '<div class="lb-empty">No scores yet — be the first!</div>';
        return;
      }
      const medals = ['🥇','🥈','🥉'];
      lbList.innerHTML = scores.map((s, i) => {
        const isNew = highlightName && s.name === highlightName && i === 0;
        return `
          <div class="lb-row${isNew ? ' new-entry' : ''}">
            <span class="lb-rank${i < 3 ? ' top' : ''}">${medals[i] || i + 1}</span>
            <span class="lb-name">${s.name}</span>
            <span class="lb-meta">rd ${s.moves}</span>
            <span class="lb-score">${Number(s.score).toLocaleString()}</span>
          </div>`;
      }).join('');
    }

    // ── submit score ──────────────────────────────────────────────

    submitBtn.addEventListener('click', submitScore);
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitScore(); });

    async function submitScore() {
      const name = nameInput.value.trim();
      if (!name) { submitMsg.textContent = 'Enter your name first.'; return; }

      submitBtn.disabled    = true;
      submitBtn.textContent = '…';
      submitMsg.textContent = '';

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            game:  GAME,
            name,
            score: finalScore,
            moves: finalRound,
            time:  `rd ${finalRound}`,
          }),
        });
        if (!res.ok) throw new Error();
        submittedName         = name;
        submitMsg.textContent = '✓ Saved!';
        submitSec.style.display = 'none';
        loadLeaderboard(name);
      } catch {
        submitMsg.textContent = '✗ Error saving score. Try again.';
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Save';
      }
    }
  </script>
</body>
</html>
